name: 知讯数据抓取

on:
  schedule:
    # UTC 01:00 = 北京 09:00，UTC 13:00 = 北京 21:00
    - cron: "0 1 * * *"
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: news-pipeline

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - name: 安装 uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: 同步依赖
        run: uv sync

      - name: 运行新闻管线
        env:
          Mimo_API_KEY: ${{ secrets.MIMO_API_KEY }}
          NEWS_LLM_API_KEY: ${{ secrets.NEWS_LLM_API_KEY }}
          NEWS_LLM_BASE_URL: ${{ secrets.NEWS_LLM_BASE_URL }}
          NEWS_LLM_MODEL: ${{ secrets.NEWS_LLM_MODEL }}
        run: uv run python -m news_pipeline

      - name: 提交并推送 news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          if git diff --cached --quiet; then
            echo "无数据更新，跳过提交"
          else
            git commit -m "chore(news): 自动更新知讯数据 $(date -u +%Y-%m-%dT%H:%M)Z"
            git push
          fi
